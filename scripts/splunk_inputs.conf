# Splunk Universal Forwarder inputs.conf for the Windows victim host.
# Deploy to: C:\Program Files\SplunkUniversalForwarder\etc\system\local\inputs.conf

[default]
# $decideOnStartup resolves to the Windows hostname at forwarder start time.
# Do not hardcode a hostname here — it breaks source identification when
# the instance is rebuilt or renamed.
host = $decideOnStartup

# Use purpose-specific indexes for each Windows Event Log channel.
# Create these three indexes in Splunk before deploying the forwarder:
#   Settings -> Indexes -> New Index
#   Names: win_security, win_application, win_system

[WinEventLog://Security]
sourcetype = WinEventLog:Security
index      = win_security
disabled   = false

[WinEventLog://Application]
sourcetype = WinEventLog:Application
index      = win_application
disabled   = false

[WinEventLog://System]
sourcetype = WinEventLog:System
index      = win_system
disabled   = false
