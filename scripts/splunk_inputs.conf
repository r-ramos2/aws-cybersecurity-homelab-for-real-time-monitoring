# Example config for Splunk Universal Forwarder inputs on Windows host.

[default]
host = WIN10-WORKSTATION

# Use purpose-specific indexes for each Windows Event Log channel.
# Create these three indexes in Splunk before deploying the forwarder:
#   Settings -> Indexes -> New Index
#   Names: win_security, win_application, win_system

[WinEventLog://Security]
sourcetype = WinEventLog:Security
index      = win_security
disabled   = false

[WinEventLog://Application]
sourcetype = WinEventLog:Application
index      = win_application
disabled   = false

[WinEventLog://System]
sourcetype = WinEventLog:System
index      = win_system
disabled   = false
