name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Restrict GITHUB_TOKEN to read-only for all jobs in this workflow.
# All three jobs (terraform validate, shellcheck, Checkov) are pure
# read operations; write access is unnecessary and violates least-privilege.
permissions:
  contents: read

# Cancel in-flight runs for the same branch/PR so stale jobs don't waste
# runner minutes or produce misleading status checks.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  scripts:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4.2.2

      # Pinned to a specific SHA for supply-chain integrity, consistent with
      # the pinned version approach used for all other actions in this workflow.
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./scripts
          severity: warning

  # Static IaC security scan with Checkov.
  #
  # Runs in hard-fail mode. Only intentional homelab trade-offs are skipped,
  # each with an explicit rationale below. Any other HIGH/CRITICAL finding
  # will break the build.
  #
  # Skipped checks and rationale:
  #   CKV_AWS_67   -- CloudTrail single-region: multi-region trail doubles
  #                   cost with no benefit in a single-account homelab.
  #   CKV_AWS_18   -- S3 access logging on CloudTrail bucket disabled:
  #                   logging a logging bucket creates recursive churn.
  #   CKV_AWS_86   -- Same S3 access logging check, different rule ID.
  #   CKV_AWS_145  -- SSE-S3 instead of CMK: KMS adds ~$1/month per key;
  #                   AES256 is sufficient for a lab environment.
  #   CKV_AWS_144  -- No S3 cross-region replication: single-region lab.
  #   CKV2_AWS_61  -- No S3 lifecycle policy: bucket is destroyed on teardown.
  #   CKV2_AWS_62  -- No S3 event notifications: not needed for audit logs.
  #   CKV_AWS_130  -- Public subnet assigns public IPs: required for Kali
  #                   and Tools instances (direct SSH / browser access).
  #   CKV2_AWS_11  -- No VPC endpoints: out of scope for a homelab.
  #   CKV_AWS_88   -- Public IPs on Kali and Tools: intentional; both
  #                   require direct internet-facing access.
  #   CKV_AWS_382  -- Unrestricted egress: lab instances need outbound
  #                   internet for package updates and tool downloads.
  #   CKV_AWS_35   -- CloudTrail not KMS-encrypted: S3 SSE-S3 (AES256)
  #                   is sufficient; CMK adds unnecessary cost.
  #   CKV_AWS_158  -- CloudWatch log groups not KMS-encrypted: same
  #                   cost rationale as CKV_AWS_35.
  #   CKV_AWS_252  -- No CloudTrail SNS topic: real-time alerting is
  #                   handled via CloudWatch metric filters instead.
  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Checkov
        run: pip install -r requirements.txt

      - name: Checkov scan (Terraform)
        run: |
          checkov \
            --directory terraform \
            --framework terraform \
            --output cli \
            --compact \
            --skip-check CKV_AWS_67,CKV_AWS_18,CKV_AWS_86,CKV_AWS_145,CKV_AWS_144,CKV2_AWS_61,CKV2_AWS_62,CKV_AWS_130,CKV2_AWS_11,CKV_AWS_88,CKV_AWS_382,CKV_AWS_35,CKV_AWS_158,CKV_AWS_252
