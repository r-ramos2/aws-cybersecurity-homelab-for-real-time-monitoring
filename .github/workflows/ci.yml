name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-flight runs for the same branch/PR so stale jobs don't waste
# runner minutes or produce misleading status checks.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  scripts:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Shellcheck
        run: |
          sudo apt-get install -y shellcheck
          shellcheck scripts/kali_setup.sh
          shellcheck scripts/nessus_install.sh
          shellcheck scripts/splunk_setup.sh
          shellcheck scripts/verify_lab.sh

  # Static IaC security scan with Checkov.
  #
  # The scan runs in soft-fail mode so findings are reported in CI output
  # without blocking merges. This keeps visibility high while allowing
  # intentional homelab trade-offs to remain documented and reviewable.
  #
  # Examples of accepted lab trade-offs:
  #   CKV_AWS_67  -- CloudTrail is single-region (multi-region adds cost)
  #   CKV_AWS_18  -- S3 access logging disabled for the logging bucket
  #   CKV_AWS_145 -- SSE-S3 used instead of a customer-managed KMS key
  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Checkov
        run: pip install -r requirements.txt

      - name: Checkov scan (Terraform)
        run: |
          checkov \
            --directory terraform \
            --framework terraform \
            --output cli \
            --compact \
            --soft-fail
