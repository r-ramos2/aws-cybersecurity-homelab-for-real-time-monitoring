name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: 1.5.7

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Shellcheck
        run: |
          sudo apt-get install -y shellcheck
          shellcheck scripts/kali_setup.sh
          shellcheck scripts/nessus_install.sh
          shellcheck scripts/splunk_setup.sh
          shellcheck scripts/verify_lab.sh

  # Static IaC security scan with Checkov. Checks for misconfigurations
  # against CIS/NIST rule sets. --soft-fail keeps CI green while surfacing
  # findings; remove it to block the pipeline on failures.
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Checkov
        run: pip install checkov --quiet

      - name: Checkov scan (Terraform)
        run: |
          checkov \
            --directory terraform \
            --framework terraform \
            --output cli \
            --compact \
            --soft-fail
