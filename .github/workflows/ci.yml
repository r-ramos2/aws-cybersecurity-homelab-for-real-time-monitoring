name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-flight runs for the same branch/PR so stale jobs don't waste
# runner minutes or produce misleading status checks.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  scripts:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Shellcheck
        run: |
          sudo apt-get install -y shellcheck
          shellcheck scripts/kali_setup.sh
          shellcheck scripts/nessus_install.sh
          shellcheck scripts/splunk_setup.sh
          shellcheck scripts/verify_lab.sh

  # Static IaC security scan with Checkov against CIS/NIST rule sets.
  # Uses the official bridgecrewio/checkov-action (pre-built, no pip install)
  # so the job completes in seconds rather than minutes.
  #
  # Skipped checks -- intentional lab trade-offs, not oversights:
  #   CKV_AWS_67  -- CloudTrail is single-region (multi-region adds cost; lab scope)
  #   CKV_AWS_18  -- S3 access logging disabled (log-of-logs adds no value here)
  #   CKV_AWS_145 -- CloudTrail bucket uses SSE-S3 (AES256), not SSE-KMS CMK
  #                  (KMS CMK cost/complexity not justified for a homelab)
  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Checkov scan (Terraform)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          output_format: cli
          compact: true
          soft_fail: false
          skip_check: CKV_AWS_67,CKV_AWS_18,CKV_AWS_145
